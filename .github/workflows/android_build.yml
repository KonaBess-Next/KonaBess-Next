name: 构建与预发布

on:
  push:
    branches: [ main, master, develop, build-test ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 构建与发布任务
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 配置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: 授予 gradlew 执行权限
      run: chmod +x gradlew

    - name: 生成版本名称与代码
      id: version
      run: |
        VERSION_NAME=$(date +'%Y.%m.%d.%H.%M.%S')
        VERSION_CODE=$(date +'%s')
        echo "Generated Version: $VERSION_NAME Code: $VERSION_CODE"
        echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT

    - name: 生成更新日志 (Changelog)
      id: changelog
      shell: bash
      run: |
        set -e
        echo "Generating changelog..."
        BEFORE="${{ github.event.before }}"
        AFTER="${{ github.event.after }}"
        if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" -n 10)
        else
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" $BEFORE..$AFTER)
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: 解密 Keystore 密钥
      if: github.event_name == 'push'
      run: |
        if [ ! -z "${{ secrets.SIGNING_KEY }}" ]; then
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > ${{ github.workspace }}/keystore.jks
          echo "Keystore decoded successfully."
        else
          echo "No SIGNING_KEY secret found. Release build will use debug signing."
        fi

    - name: 构建 Release 签名版 APK
      if: github.event_name == 'push'
      run: |
        if [ ! -z "${{ secrets.SIGNING_KEY }}" ]; then
          ./gradlew assembleRelease \
            -PciVersionName="${{ steps.version.outputs.version }}" \
            -PciVersionCode="${{ steps.version.outputs.code }}" \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace
        else
          ./gradlew assembleRelease \
            -PciVersionName="${{ steps.version.outputs.version }}" \
            -PciVersionCode="${{ steps.version.outputs.code }}" \
            -Pandroid.injected.signing.store.file=$HOME/.android/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            --stacktrace
        fi

    - name: 构建 Debug 测试版 APK
      run: ./gradlew assembleDebug -PciVersionName="${{ steps.version.outputs.version }}" -PciVersionCode="${{ steps.version.outputs.code }}" --stacktrace

    - name: 规范化 APK 文件名
      run: |
        set -e
        VERSION="${{ steps.version.outputs.version }}"
        process_apks() {
          local dir=$1
          local type=$2
          if [ -d "$dir" ]; then
            find "$dir" -name "*.apk" -type f | while read file; do
              filename=$(basename "$file")
              abi="universal"
              if [[ "$filename" == *"arm64-v8a"* ]]; then abi="arm64-v8a"; fi
              new_name="KonaBessNext-v${VERSION}-${abi}-${type}.apk"
              mv "$file" "$(dirname "$file")/$new_name"
            done
          fi
        }
        process_apks "app/build/outputs/apk/debug" "debug"
        if [ "${{ github.event_name }}" == "push" ]; then
          process_apks "app/build/outputs/apk/release" "release"
        fi

    - name: VirusTotal 病毒安全扫描
      id: virustotal
      if: github.event_name == 'push' && env.VT_API_KEY != ''
      env:
        VT_API_KEY: ${{ secrets.VT_API_KEY }}
      uses: crazy-max/ghaction-virustotal@v4
      with:
        vt_api_key: ${{ secrets.VT_API_KEY }}
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk

    - name: 创建 GitHub Release 发布页面
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.version.outputs.version }}"
        name: "测试构建 ${{ steps.version.outputs.version }}"
        body: |
          > [!WARNING]
          > **汉化测试预览版**
          
          ## 构建信息
          * 版本: `${{ steps.version.outputs.version }}`
          * 分支: `${{ github.ref_name }}`
          
          ## 更新内容
          ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: true
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 上传编译产物 (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: KonaBess-Next-ZH-CN-Build
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk

    - name: 清理临时密钥文件
      if: always()
      run: rm -f ${{ github.workspace }}/keystore.jks